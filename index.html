<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeQuest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="setup-overlay" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>Welcome</h2>
            <p>Enter your birthday:</p>
            <input type="date" id="birthdate-input">
            <button id="start-btn" class="control-btn">Start Journey</button>
        </div>
    </div>

    <div class="app-container">
        <div id="home-view" class="view">
            <header>
                <div class="user-info">
                    <span id="life-age">Age --</span>
                    <span id="active-mode" class="badge">Level 1: Seedling 🌱</span>
                </div>
                <div class="lp-bar-bg"><div id="lp-bar-fill"></div></div>
            </header>
            <main class="character-space">
                <img src="https://via.placeholder.com/200x250?text=Character" id="main-character">
            </main>
        </div>

        <div id="quests-view" class="view" style="display: none;">
            <h1 class="view-title">Quests</h1>
            <p class="section-subtitle">Daily Tasks</p>
            <div id="category-list"></div>
            
            <h1 class="view-title" style="margin-top: 30px;">Life Quests</h1>
            <div class="category-card"><p style="color:#ccc; text-align:center;">Locked until Level 5</p></div>
        </div>

        <div id="focus-view" class="view" style="display: none;">
            <div class="timer-container">
                <input type="text" class="focus-task-input" placeholder="Current Task...">
                <div class="circular-timer">
                    <svg width="200" height="200">
                        <circle class="ring-bg" cx="100" cy="100" r="90"></circle>
                        <circle id="timer-ring" class="ring-progress" cx="100" cy="100" r="90"></circle>
                    </svg>
                    <div id="timer-display">30:00</div>
                </div>
                <button id="start-stop-btn" class="control-btn">Start Session</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <button id="home-btn" class="nav-btn active-tab">Home</button>
            <button id="quest-btn" class="nav-btn">Quests</button>
            <button id="focus-btn" class="nav-btn">Focus</button>
            <button id="vacation-toggle" class="nav-btn">🌴</button>
        </nav>
    </div>
    <script src="script.js"></script>
</body>
</html>
