<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeQuest Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="user-info">
                <span id="life-age">Age 16</span>
                <span id="active-mode" class="badge">The Deep Diver</span>
            </div>
            <div class="lp-container">
                <span class="lp-label">LP</span>
                <div class="lp-bar-bg">
                    <div id="lp-bar-fill" style="width: 45%;"></div>
                </div>
            </div>
        </header>

        <main class="character-space">
            <img src="https://via.placeholder.com/200x250?text=Marshmallow+Human" alt="Character" id="main-character">
        </main>

        <nav class="bottom-nav">
            <button class="nav-btn active">Home</button>
            <button class="nav-btn">Quests</button>
            <button class="nav-btn">Focus</button>
            <button id="vacation-toggle" class="nav-btn">🌴</button>
        </nav>
    </div>
</body>
</html>
