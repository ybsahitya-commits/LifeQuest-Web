<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeQuest</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        
        <div id="home-view">
            <header>
                <div class="user-info">
                    <span id="life-age">Age 16</span>
                    <span id="active-mode" class="badge">The Deep Diver</span>
                </div>
                <div class="lp-container">
                    <span class="lp-label">LP</span>
                    <div class="lp-bar-bg">
                        <div id="lp-bar-fill" style="width: 0%;"></div>
                    </div>
                </div>
            </header>

            <main class="character-space">
                <img src="https://via.placeholder.com/200x250?text=Marshmallow+Human" alt="Character" id="main-character">
            </main>
        </div>

        <div id="quests-view" style="display: none;">
            <h1 class="view-title">Quests</h1>
            <p class="section-subtitle">Daily Tasks</p>
            
            <div id="category-list"></div>

            <div class="life-quests-section">
                <h2 class="view-title">Life Quests</h2>
                <div class="category-card">
                    <p style="color: #aaa; font-style: italic;">No life quests available yet...</p>
                </div>
            </div>
        </div>

        <div id="focus-view" style="display: none;">
            <h1 class="view-title">Focus</h1>
            <div class="character-space">
                <div class="timer-display">
                    <h2 id="timer-display">25:00</h2>
                    <button id="start-focus" class="badge">Start Session</button>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button id="home-btn" class="nav-btn active-tab">Home</button>
            <button id="quest-btn" class="nav-btn">Quests</button>
            <button id="focus-btn" class="nav-btn">Focus</button>
            <button id="vacation-toggle" class="nav-btn">🌴</button>
        </nav>

    </div>

    <script src="script.js"></script>
</body>
</html>
